# Tee time search targets.
#
# Each [[targets]] block is one configured destination — typically one
# tenant on one booking platform, possibly covering multiple courses
# at that tenant (CPS Westminster covers 3 courses in one API call).
#
# The `params` table is platform-specific; see each adapter's docstring
# for what it expects. As more adapters land, more targets light up
# automatically (see config.py — unknown adapters are skipped with a
# warning until their implementation is added).

# ──────────────────────────────────────────────────────────────────────
# CPS / Club Prophet Systems  (*.cps.golf)
# ──────────────────────────────────────────────────────────────────────

[[targets]]
slug = "westminster"
name = "Westminster (Legacy Ridge + Walnut Creek)"
adapter = "cps"
timezone = "America/Denver"
booking_url = "https://cityofwestminster.cps.golf/onlineresweb/search-teetime"

  [targets.params]
  tenant = "cityofwestminster"
  website_id = "be7f2728-0758-4a72-fe80-08d97849167d"
  api_key = "8ea2914e-cac2-48a7-a3e5-e0f41350bf3a"
  site_id = 2
  # Legacy Ridge (1), Walnut Creek (2), Legacy Ridge Back 9 (4)
  course_ids = [1, 2, 4]

# TODO: Fossil Trace — needs a 30s recon run against fossiltrace.cps.golf
# to capture its website_id / api_key / site_id / course_ids. See
# investigation/capture.py.

# ──────────────────────────────────────────────────────────────────────
# MemberSports (`api.membersports.com`)
# ──────────────────────────────────────────────────────────────────────
# Per-(group_id, date) responses are cached inside the adapter, so
# multiple targets in the same group only cost one HTTP call per search.

[[targets]]
slug = "city-park"
name = "City Park"
adapter = "membersports"
timezone = "America/Denver"
booking_url = "https://app.membersports.com/tee-times/3660/4711/1"

  [targets.params]
  group_id = 1
  club_id = 3660
  course_id = 4711

