# ──────────────────────────────────────────────────────────────────────
# TeeItUp / Kenna  (`phx-api-be-east-1b.kenna.io`)
# ──────────────────────────────────────────────────────────────────────
# Each course is its own facility on Kenna; one HTTP call per target.

# Riverdale's site at riverdalegolf.com fronts two distinct 18-hole
# courses (Dunes and Knolls) on separate Kenna facility IDs. Modeled
# as separate targets so users can opt into either or both.

[[targets]]
slug = "riverdale-dunes"
name = "Riverdale Dunes"
adapter = "teeitup"
timezone = "America/Denver"
area = "northeast"
lat = 39.9158
lng = -104.9814
booking_url = "https://www.riverdalegolf.com/teetimes/"

  [targets.params]
  alias = "riverdale"
  facility_id = 1016


[[targets]]
slug = "commonground"
name = "CommonGround"
adapter = "teeitup"
timezone = "America/Denver"
area = "southeast"
lat = 39.6469
lng = -104.8780
booking_url = "https://commonground-golf-course.book.teeitup.com/"

  [targets.params]
  alias = "commonground-golf-course"
  facility_id = 5275

# ──────────────────────────────────────────────────────────────────────
# Quick18  (`*.quick18.com`)
# ──────────────────────────────────────────────────────────────────────
# HTML form POST; slots extracted via regex over booking-link URLs.

[[targets]]
slug = "thorncreek"
name = "Thorncreek"
adapter = "quick18"
timezone = "America/Denver"
area = "northeast"
lat = 39.9397
lng = -104.9114
booking_url = "https://thorncreek.quick18.com/teetimes/searchmatrix"

  [targets.params]
  host = "thorncreek.quick18.com"
  course_id = 693                # 18-hole course id; 9-hole searches use virtual id -9
  # Suffix applied to target.name when a slot is at one of these
  # 9-hole sub-courses. Keys must be strings (TOML int-key restriction).
  [targets.params.nine_hole_suffixes]
  "694" = " (back 9)"
  "705" = " (front 9)"

