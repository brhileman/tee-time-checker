# ──────────────────────────────────────────────────────────────────────
# TeeItUp / Kenna  (`phx-api-be-east-1b.kenna.io`)
# ──────────────────────────────────────────────────────────────────────
# Each course is its own facility on Kenna; one HTTP call per target.

[[targets]]
slug = "riverdale"
name = "Riverdale Dunes"
adapter = "teeitup"
timezone = "America/Denver"
booking_url = "https://www.riverdalegolf.com/teetimes/"

  [targets.params]
  alias = "riverdale"
  facility_id = 1016

