# ──────────────────────────────────────────────────────────────────────
# TeeItUp / Kenna  (`phx-api-be-east-1b.kenna.io`)
# ──────────────────────────────────────────────────────────────────────
# Each course is its own facility on Kenna; one HTTP call per target.

# Riverdale's site at riverdalegolf.com fronts two distinct 18-hole
# courses (Dunes and Knolls) on separate Kenna facility IDs. Modeled
# as separate targets so users can opt into either or both.

[[targets]]
slug = "riverdale-dunes"
name = "Riverdale Dunes"
adapter = "teeitup"
timezone = "America/Denver"
booking_url = "https://www.riverdalegolf.com/teetimes/"

  [targets.params]
  alias = "riverdale"
  facility_id = 1016

[[targets]]
slug = "riverdale-knolls"
name = "Riverdale Knolls"
adapter = "teeitup"
timezone = "America/Denver"
booking_url = "https://www.riverdalegolf.com/teetimes/"

  [targets.params]
  alias = "riverdale"
  facility_id = 1017

[[targets]]
slug = "commonground"
name = "CommonGround"
adapter = "teeitup"
timezone = "America/Denver"
booking_url = "https://commonground-golf-course.book.teeitup.com/"

  [targets.params]
  alias = "commonground-golf-course"
  facility_id = 5275

# ──────────────────────────────────────────────────────────────────────
# Quick18  (`*.quick18.com`)
# ──────────────────────────────────────────────────────────────────────
# HTML form POST; slots extracted via regex over booking-link URLs.

[[targets]]
slug = "thorncreek"
name = "Thorncreek"
adapter = "quick18"
timezone = "America/Denver"
booking_url = "https://thorncreek.quick18.com/teetimes/searchmatrix"

  [targets.params]
  host = "thorncreek.quick18.com"
  course_id = 693                # 18-hole course id; 9-hole searches use virtual id -9
  # Suffix applied to target.name when a slot is at one of these
  # 9-hole sub-courses. Keys must be strings (TOML int-key restriction).
  [targets.params.nine_hole_suffixes]
  "694" = " (back 9)"
  "705" = " (front 9)"

# ──────────────────────────────────────────────────────────────────────
# Noteefy  (`booking-engine.noteefy.app`)
# ──────────────────────────────────────────────────────────────────────
# Cloudflare-fronted; the adapter handles the TLS-fingerprint headers.

[[targets]]
slug = "broadlands"
name = "Broadlands"
adapter = "noteefy"
timezone = "America/Denver"
# Slot booking_urls are per-date ChronoGolf deep links and override
# this generic value at search time. Kept here as a fallback.
booking_url = "https://www.chronogolf.com/club/broadlands-golf-course"

  [targets.params]
  course_id = "CO_The_Broadlands"
  # Public_id from the Broadlands waitlist page; populates the referer
  # header so Cloudflare doesn't get suspicious.
  public_id = "ba16828e-77e6-425f-b63d-ac27e785f69d"
  # Course-specific player rate filter UUIDs. Get these for a new
  # Noteefy course by inspecting any /tee-times/availability POST in
  # the booking page's network tab.
  player_type_ids = [
    "049dfe76-2006-4994-acce-f99454e07be3",
    "1835383c-60be-461e-9cda-d037f760dd29",
  ]
